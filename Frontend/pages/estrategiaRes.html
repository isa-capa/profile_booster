<!DOCTYPE html>

<html class="dark" lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Profile Booster - Resumen Ejecutivo</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="../js/tailwind-config.js"></script>
    <link href="../css/global.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
</head>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
    <div class="relative flex h-auto min-h-screen w-full flex-col group/design-root overflow-x-hidden">
        <div class="layout-container flex h-full grow flex-col">
            <!-- Navigation Bar -->
            <header
                class="flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-200 dark:border-slate-800 px-6 py-3 lg:px-40 bg-background-light dark:bg-background-dark sticky top-0 z-50">
                <div class="flex items-center gap-8">
                    <div class="flex items-center gap-3 text-primary">
                        <div class="size-8 flex items-center justify-center rounded-lg overflow-hidden">
                            <img src="../assets/logo.png" alt="Profile Booster Logo" class="w-full h-full object-cover">
                        </div>
                        <h2 class="text-slate-900 dark:text-white text-lg font-bold leading-tight tracking-[-0.015em]">
                            Profile Booster</h2>
                    </div>
                    <div class="hidden md:flex items-center gap-6">
                        <a class="text-slate-900 dark:text-slate-100 text-sm font-medium hover:text-primary transition-colors"
                            href="Dashboard.html">Dashboard</a>
                        <a class="text-slate-900 dark:text-slate-100 text-sm font-medium hover:text-primary transition-colors"
                            href="aplicacion.html">Aplicaciones</a>
                        <a class="text-slate-900 dark:text-slate-100 text-sm font-medium hover:text-primary transition-colors"
                            href="#">Configuración</a>
                    </div>
                </div>
                <div class="flex flex-1 justify-end gap-6 items-center">
                    <div id="user-avatar"
                        class="bg-center bg-no-repeat aspect-square bg-cover rounded-full size-10 border-2 border-primary/50"
                        data-alt="User profile avatar showing a professional man"
                        style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuA4gD-d_TviHSXisQ4zcZzDfT5SY0EHjYe47PcGg2WLZ72qMNMpex0aXFrjyiQ4-FLRC1xTvv4sC_cIhLm7B7zMK_hDnRU9TFQ7J81-EyCELPc6t1qz8pEDokucWfdwJG-JPqqWstm7vBDkJpFt1f3tPRLNvypzmiQUeTM0pbMeIwUheRXTtZnYgGYvvrf0UCigonz90EZ_MjMbTuEYNrS1y-FJfdMDYt6H2nfSWfMQDU5_fNBlmQfrPAXwyzNOHLJdUaMI4hu64O-V");'>
                    </div>
                </div>
            </header>
            <!-- Main Content Container -->
            <main class="flex flex-1 justify-center py-6 px-4 lg:px-40">
                <div class="layout-content-container flex flex-col max-w-[1200px] flex-1">
                    <!-- Secondary Navigation Tabs -->
                    <div class="mt-4 px-6 lg:px-40 w-full overflow-x-auto">
                        <div
                            class="flex border-b border-slate-200 dark:border-slate-800 gap-8 min-w-max max-w-[1200px] mx-auto">
                            <a class="flex flex-col items-center justify-center border-b-2 border-primary text-primary pb-3 pt-2 px-1 transition-all"
                                href="estrategiaRes.html">
                                <p class="text-sm font-bold leading-normal tracking-wide">Resumen</p>
                            </a>
                            <a class="flex flex-col items-center justify-center border-b-2 border-transparent text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 pb-3 pt-2 px-1 transition-all"
                                href="estrategiaAnali.html">
                                <p class="text-sm font-bold leading-normal tracking-wide">Análisis de Oportunidad</p>
                            </a>
                            <a class="flex flex-col items-center justify-center border-b-2 border-transparent text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 pb-3 pt-2 px-1 transition-all"
                                href="estrategia.html">
                                <p class="text-sm font-bold leading-normal tracking-wide">Plan de Preparación</p>
                            </a>
                            <a class="flex flex-col items-center justify-center border-b-2 border-transparent text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 pb-3 pt-2 px-1 transition-all"
                                href="estrategiaRecu.html">
                                <p class="text-sm font-bold leading-normal tracking-wide">Recursos</p>
                            </a>
                        </div>
                    </div>
                    <!-- Header Section -->
                    <div class="flex flex-wrap justify-between items-end gap-4 mb-8">
                        <div class="flex flex-col gap-2">
                            <h1 class="text-slate-900 dark:text-white text-4xl font-black leading-tight tracking-tight">
                                Resumen Ejecutivo <span id="company-name" class="text-primary font-bold hidden">-
                                </span></h1>
                            <p id="page-subtitle" class="text-slate-600 dark:text-slate-400 text-lg font-normal">...</p>
                        </div>
                        <button id="btn-export-report"
                            class="bg-primary hover:bg-primary/90 text-white px-6 py-2.5 rounded-xl font-semibold flex items-center gap-2 transition-all shadow-lg shadow-primary/20">
                            <span class="material-symbols-outlined text-[20px]">download</span>
                            Exportar Reporte
                        </button>
                    </div>
                    <!-- Strategy Hero Card -->
                    <div class="mb-8">
                        <div
                            class="flex flex-col lg:flex-row items-stretch rounded-2xl overflow-hidden shadow-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900/40">
                            <div class="lg:w-1/3 h-64 lg:h-auto bg-cover bg-center"
                                data-alt="Data visualization charts on a digital screen"
                                style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuCGYfb-bGgCszXrQcmBMEn-bvGHd1vmlzPgfVMzev79gIWbki331umHW7Cs8kYAVaWe2eBAoOkl-7mqIBSJ9VBaaAcFOK11qtTC2qoc85X5Ew8ri-qgWjOoAMaGbrE05CZQjcICzji34_7K01oA4KcGT9YIeWUBKE5gfDvOkjh9XO5OT-81HJq1Ej3rp6PkITLAION1hv4Xdc0Rq-LRXWDj-gRBEfr-a7OAhI9Boy8QSvnmVDaDFSLQfKFsCppfq8y0AjoAYnlFnLnc");'>
                            </div>
                            <div class="flex-1 p-8 flex flex-col justify-center">
                                <div id="hero-badge"
                                    class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-primary/10 text-primary text-xs font-bold uppercase tracking-wider mb-4 w-fit">
                                    <span class="material-symbols-outlined text-[14px] fill-1">verified</span>
                                    ...
                                </div>
                                <h3 id="hero-title" class="text-slate-900 dark:text-white text-2xl font-bold mb-4">...
                                </h3>
                                <p id="hero-description"
                                    class="text-slate-600 dark:text-slate-400 text-lg leading-relaxed mb-6">...</p>
                                <div class="flex gap-4">
                                    <button
                                        class="bg-primary text-white px-6 py-2 rounded-xl text-sm font-bold hover:brightness-110 transition-all">Ver
                                        Detalles del Plan</button>
                                    <button
                                        class="border border-slate-300 dark:border-slate-700 text-slate-700 dark:text-slate-300 px-6 py-2 rounded-xl text-sm font-bold hover:bg-slate-100 dark:hover:bg-slate-800 transition-all">Editar
                                        Perfil</button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <!-- Two Columns Section -->
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                        <!-- Key Strengths -->
                        <div class="flex flex-col gap-4">
                            <h2 class="text-slate-900 dark:text-white text-xl font-bold px-1">Fortalezas Clave</h2>
                            <div id="strengths-container" class="grid gap-4">
                                <!-- Dynamic content injected via TS -->
                            </div>
                        </div>
                        <!-- Roadmap / Next Steps -->
                        <div class="flex flex-col gap-4">
                            <h2 class="text-slate-900 dark:text-white text-xl font-bold px-1">Próximos Pasos</h2>
                            <div
                                class="p-6 rounded-xl border border-primary/20 bg-primary/5 dark:bg-primary/10 relative overflow-hidden">
                                <div class="relative z-10 flex flex-col gap-6">
                                    <div id="next-steps-container" class="flex flex-col gap-6">
                                        <!-- Dynamic content injected via TS -->
                                    </div>
                                    <button
                                        class="w-full py-3 bg-white dark:bg-slate-900 text-primary border border-primary/20 font-bold rounded-xl hover:bg-primary/5 transition-colors">
                                        Ver Calendario Completo
                                    </button>
                                </div>
                                <!-- Subtle abstract background element -->
                                <div class="absolute -right-10 -bottom-10 size-40 bg-primary/10 rounded-full blur-3xl">
                                </div>
                            </div>
                        </div>
                    </div>
                    <!-- Quick Stats Row -->
                    <div id="quick-stats-container" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                        <!-- Dynamic stats go here -->
                    </div>
                </div>
            </main>
            <!-- Footer -->
            <footer
                class="border-t border-slate-200 dark:border-slate-800 py-8 text-center text-slate-500 dark:text-slate-400 text-sm">
                <p>made with ❤️ by IsaDev © 2026</p>
            </footer>
        </div>
        <script type="module" src="../js/estrategiaRes.js"></script>
</body>

</html>
